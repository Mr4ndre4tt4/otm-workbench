name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        run: python -m pip install -e ".[dev]"

      - name: Run backend governance/current-phase tests
        run: >
          python -m pytest
          tests/test_modules_navigation.py
          tests/test_operational_context.py
          tests/test_project_cockpit_summary.py
          tests/test_rates_batches.py
          -q

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Run frontend current-phase smoke tests
        run: >
          npm test --
          src/app/AppFunctionalAssets.test.tsx
          src/app/AppFunctionalRates.test.tsx
          src/app/AppFunctionalShell.test.tsx

      - name: Build frontend
        run: npm run build
